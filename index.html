<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cek Usia | Verifikasi Dewasa & Anak-Anak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        .card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .card-header {
            background: #ffffff;
            padding: 1.75rem 2rem;
            border-bottom: 1px solid #e9edf2;
        }

        .title-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .title-section svg {
            flex-shrink: 0;
        }

        .card-header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.4px;
            background: linear-gradient(135deg, #1E3A8A, #2563EB);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .subhead {
            color: #5b6e8c;
            font-size: 0.9rem;
            font-weight: 400;
            margin-top: 0.25rem;
            margin-left: 2.5rem;
        }

        .card-content {
            padding: 2rem 2rem 1.5rem;
        }

        .input-group {
            margin-bottom: 1.75rem;
        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            color: #1f2a44;
            margin-bottom: 0.65rem;
            font-size: 0.9rem;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-wrapper input {
            flex: 1;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
            color: #0b1e3a;
            font-family: 'Inter', monospace;
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        .btn-primary {
            background: #1e40af;
            border: none;
            padding: 0 1.8rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.2px;
            box-shadow: 0 2px 6px rgba(30, 64, 175, 0.2);
        }

        .btn-primary:hover {
            background: #1e3a8a;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(30, 64, 175, 0.2);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .result-panel {
            margin: 1.5rem 0 1.8rem;
            padding: 1.2rem 1.4rem;
            border-radius: 20px;
            background: #f8fafd;
            border-left: 4px solid #3b82f6;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .result-message {
            font-size: 1rem;
            font-weight: 500;
            color: #0f2b3d;
            line-height: 1.4;
        }

        .history-section {
            margin-top: 1.8rem;
            border-top: 1.5px solid #edf2f7;
            padding-top: 1.5rem;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .history-header h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 1.2rem;
            color: #0c2e4e;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.45rem 1.1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            color: #0f172a;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #eef2f8;
            background: white;
        }

        .record-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .record-table th {
            background: #f1f6fe;
            color: #1e40af;
            font-weight: 600;
            padding: 14px 16px;
            border-bottom: 1.5px solid #dfe9f5;
            text-align: left;
        }

        .record-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #edf2f9;
            color: #1e2a47;
            font-weight: 500;
        }

        .record-table tr:last-child td {
            border-bottom: none;
        }

        .record-table tr:hover td {
            background-color: #fafcff;
        }

        .badge-adult {
            background: #dcfce7;
            color: #15803d;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.72rem;
            display: inline-block;
            letter-spacing: -0.2px;
        }

        .badge-child {
            background: #fff1e6;
            color: #c2410c;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.72rem;
            display: inline-block;
        }

        .empty-row td {
            text-align: center;
            color: #8196b1;
            padding: 1.8rem;
            font-weight: 400;
        }

        .footer-note {
            background: #fcfdff;
            padding: 1rem 2rem;
            text-align: center;
            border-top: 1px solid #edf2f8;
            font-size: 0.7rem;
            color: #7c8ba0;
            letter-spacing: 0.2px;
        }

        @media (max-width: 580px) {
            body {
                padding: 1rem;
            }
            .input-wrapper {
                flex-direction: column;
            }
            .btn-primary {
                justify-content: center;
                padding: 0.9rem;
            }
            .card-content {
                padding: 1.5rem;
            }
            .card-header {
                padding: 1.25rem 1.5rem;
            }
            .card-header h1 {
                font-size: 1.4rem;
            }
            .subhead {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="title-section">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z" fill="#3B82F6"/>
                </svg>
                <h1>Verifikasi Usia</h1>
            </div>
            <div class="subhead">Tentukan status dewasa atau anak-anak berdasarkan batas usia 17 tahun</div>
        </div>

        <div class="card-content">
            <div class="input-group">
                <div class="input-label">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13h-1v6l5.25 3.15.75-1.23-4.5-2.67z" fill="#5B6E8C"/>
                    </svg>
                    <span>Usia (tahun)</span>
                </div>
                <div class="input-wrapper">
                    <input type="number" id="ageInput" placeholder="Masukkan angka usia" min="0" max="120" step="1">
                    <button class="btn-primary" id="checkBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="white"/>
                        </svg>
                        Cek Status
                    </button>
                </div>
            </div>

            <div class="result-panel" id="resultPanel">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" id="resultIcon">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" fill="#3B82F6"/>
                </svg>
                <div class="result-message" id="resultMsg">Masukkan usia lalu tekan tombol cek</div>
            </div>

            <div class="history-section">
                <div class="history-header">
                    <h3>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z" fill="#2563EB"/>
                        </svg>
                        Riwayat Pengecekan
                    </h3>
                    <button class="btn-secondary" id="resetHistoryBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="#475569"/>
                        </svg>
                        Bersihkan
                    </button>
                </div>
                <div class="table-container">
                    <table class="record-table" id="historyTable">
                        <thead>
                            <tr><th>No</th><th>Usia</th><th>Status</th><th>Waktu Cek</th></tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr class="empty-row"><td colspan="4">Belum ada data pengecekan</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="footer-note">
            <span>✔️ Kriteria: usia ≥ 17 tahun = Dewasa | usia &lt; 17 tahun = Anak-anak</span>
        </div>
    </div>

    <script>
        (function(){
            let historyRecords = [];

            const ageInput = document.getElementById('ageInput');
            const checkBtn = document.getElementById('checkBtn');
            const resultPanel = document.getElementById('resultPanel');
            const resultMsg = document.getElementById('resultMsg');
            const resultIcon = document.getElementById('resultIcon');
            const historyBody = document.getElementById('historyBody');
            const resetBtn = document.getElementById('resetHistoryBtn');

            function getCurrentTimestamp(){
                const now = new Date();
                return now.toLocaleString('id-ID', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit', hour12: false });
            }

            function updateResultUI(age, statusType, isError = false, errorText = ''){
                if(isError){
                    resultMsg.innerHTML = errorText;
                    resultPanel.style.borderLeftColor = '#f97316';
                    resultPanel.style.background = '#fffaf5';
                    resultIcon.setAttribute('d', 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z');
                    resultIcon.setAttribute('fill', '#ea580c');
                    return;
                }
                
                if(statusType === 'adult'){
                    resultMsg.innerHTML = `✅ ${age} tahun — Anda sudah dewasa. Akses penuh tersedia.`;
                    resultPanel.style.borderLeftColor = '#22c55e';
                    resultPanel.style.background = '#f0fdf4';
                    resultIcon.setAttribute('d', 'M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z');
                    resultIcon.setAttribute('fill', '#15803d');
                } else {
                    resultMsg.innerHTML = `🌱 ${age} tahun — Anda masih anak-anak. Tetap semangat belajar!`;
                    resultPanel.style.borderLeftColor = '#f97316';
                    resultPanel.style.background = '#fff7ed';
                    resultIcon.setAttribute('d', 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z');
                    resultIcon.setAttribute('fill', '#c2410c');
                }
            }

            function addHistoryEntry(ageValue, statusKey, displayMessage){
                const newEntry = {
                    id: Date.now() + Math.random(),
                    usia: ageValue,
                    status: statusKey,
                    waktu: getCurrentTimestamp()
                };
                historyRecords.unshift(newEntry);
                if(historyRecords.length > 18) historyRecords.pop();
                renderHistoryTable();
            }

            function renderHistoryTable(){
                historyBody.innerHTML = '';
                if(historyRecords.length === 0){
                    const emptyRow = document.createElement('tr');
                    emptyRow.classList.add('empty-row');
                    emptyRow.innerHTML = '<td colspan="4">📭 Belum ada data pengecekan</td>';
                    historyBody.appendChild(emptyRow);
                    return;
                }
                
                for(let i = 0; i < historyRecords.length; i++){
                    const rec = historyRecords[i];
                    const row = document.createElement('tr');
                    
                    const noCell = document.createElement('td');
                    noCell.textContent = (i+1).toString();
                    noCell.style.fontWeight = '500';
                    
                    const usiaCell = document.createElement('td');
                    usiaCell.textContent = `${rec.usia} tahun`;
                    usiaCell.style.fontWeight = '600';
                    
                    const statusCell = document.createElement('td');
                    if(rec.status === 'adult'){
                        statusCell.innerHTML = '<span class="badge-adult">✔️ Dewasa (≥17)</span>';
                    } else {
                        statusCell.innerHTML = '<span class="badge-child">🌟 Anak-anak (<17)</span>';
                    }
                    
                    const waktuCell = document.createElement('td');
                    waktuCell.textContent = rec.waktu;
                    waktuCell.style.fontSize = '0.75rem';
                    waktuCell.style.color = '#4b5565';
                    
                    row.appendChild(noCell);
                    row.appendChild(usiaCell);
                    row.appendChild(statusCell);
                    row.appendChild(waktuCell);
                    historyBody.appendChild(row);
                }
            }

            function performCheck(){
                let rawValue = ageInput.value.trim();
                if(rawValue === ""){
                    updateResultUI(null, null, true, '⚠️ Usia tidak boleh kosong');
                    return false;
                }
                const ageNum = Number(rawValue);
                if(isNaN(ageNum) || !Number.isInteger(ageNum) || ageNum < 0){
                    updateResultUI(null, null, true, '❌ Masukkan angka usia yang valid (0-120)');
                    return false;
                }
                if(ageNum > 120){
                    updateResultUI(null, null, true, '⚠️ Usia maksimal 120 tahun, masukkan angka realistis');
                    return false;
                }
                
                let statusType = '';
                let resultMessage = '';
                if(ageNum >= 17){
                    statusType = 'adult';
                    resultMessage = `Anda sudah dewasa`;
                } else {
                    statusType = 'child';
                    resultMessage = `Anda masih anak-anak`;
                }
                
                updateResultUI(ageNum, statusType, false);
                addHistoryEntry(ageNum, statusType, resultMessage);
                ageInput.value = '';
                ageInput.focus();
                return true;
            }

            function resetHistory(){
                if(historyRecords.length > 0){
                    if(confirm('Hapus seluruh riwayat pengecekan usia?')){
                        historyRecords = [];
                        renderHistoryTable();
                        updateResultUI(null, null, true, '🗑️ Riwayat telah dibersihkan');
                        setTimeout(() => {
                            if(resultMsg.innerText === '🗑️ Riwayat telah dibersihkan'){
                                resultMsg.innerHTML = 'Masukkan usia lalu tekan tombol cek';
                                resultPanel.style.borderLeftColor = '#3b82f6';
                                resultPanel.style.background = '#f8fafd';
                                resultIcon.setAttribute('d', 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z');
                                resultIcon.setAttribute('fill', '#3B82F6');
                            }
                        }, 2200);
                    }
                } else {
                    updateResultUI(null, null, true, 'ℹ️ Belum ada riwayat untuk dihapus');
                    setTimeout(() => {
                        if(resultMsg.innerText === 'ℹ️ Belum ada riwayat untuk dihapus'){
                            resultMsg.innerHTML = 'Masukkan usia lalu tekan tombol cek';
                            resultPanel.style.borderLeftColor = '#3b82f6';
                            resultPanel.style.background = '#f8fafd';
                            resultIcon.setAttribute('d', 'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z');
                            resultIcon.setAttribute('fill', '#3B82F6');
                        }
                    }, 1800);
                }
            }

            checkBtn.addEventListener('click', (e) => {
                e.preventDefault();
                performCheck();
            });
            
            ageInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter'){
                    e.preventDefault();
                    performCheck();
                }
            });
            
            ageInput.addEventListener('input', function(){
                let val = parseInt(ageInput.value, 10);
                if(ageInput.value !== ""){
                    if(isNaN(val)) ageInput.value = "";
                    else if(val < 0) ageInput.value = 0;
                    else if(val > 120) ageInput.value = 120;
                }
            });
            
            resetBtn.addEventListener('click', (e) => {
                e.preventDefault();
                resetHistory();
            });
            
            renderHistoryTable();
            resultMsg.innerHTML = 'Masukkan usia lalu tekan tombol cek';
            resultPanel.style.borderLeftColor = '#3b82f6';
            resultPanel.style.background = '#f8fafd';
        })();
    </script>
</body>
</html>
